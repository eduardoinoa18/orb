[pytest]
# Tells pytest where tests live
testpaths = tests

# Adds the project root to sys.path so all our packages resolve correctly.
# This means you can run `pytest` from inside the orb-platform/ folder
# and it will find `platform`, `config`, `agents`, and `integrations` packages.
pythonpath = .

# Shows test names inline while running
addopts = -v

# Filter known third-party deprecation warnings
filterwarnings =
    ignore::DeprecationWarning:supabase._sync.client
    ignore:The 'timeout' parameter is deprecated.*:DeprecationWarning
    ignore:The 'verify' parameter is deprecated.*:DeprecationWarning
